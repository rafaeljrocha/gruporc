<!-- Modal Canal -->
<div class="overlay-modal" id="modal-canal">
  <div class="caixa-modal">
    <h3 id="titulo-modal-canal">Novo Canal</h3>
    <form id="form-canal">
      <input type="hidden" name="id">
      <div class="campo"><label>Nome *</label><input type="text" name="nome" required></div>
      <div class="campo"><label>Plataforma *</label>
        <select name="plataforma" required>
          <option value="Instagram">Instagram</option>
          <option value="YouTube">YouTube</option>
          <option value="TikTok">TikTok</option>
          <option value="Facebook">Facebook</option>
          <option value="LinkedIn">LinkedIn</option>
          <option value="WhatsApp Business">WhatsApp Business</option>
          <option value="Telegram">Telegram</option>
          <option value="Site">Site</option>
          <option value="Blog">Blog</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
      <div class="campo"><label>Handle / URL</label><input type="text" name="url_handle"></div>
      <div class="campo"><label>Seguidores</label><input type="number" name="seguidores"></div>
      <div class="campo"><label>Status</label>
        <select name="status">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
          <option value="em_criacao">Em criação</option>
        </select>
      </div>
      <div class="campo"><label>Responsável</label><input type="text" name="responsavel"></div>
      <div class="campo"><label>Observações</label><textarea name="observacoes"></textarea></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-canal')">Cancelar</button>
      <button class="botao" onclick="salvarCanal()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Conteúdo -->
<div class="overlay-modal" id="modal-conteudo">
  <div class="caixa-modal">
    <h3 id="titulo-modal-conteudo">Novo Conteúdo</h3>
    <form id="form-conteudo">
      <input type="hidden" name="id">
      <div class="campo"><label>Título *</label><input type="text" name="titulo" required></div>
      <div class="campo"><label>Canal</label><select name="canal_id"></select></div>
      <div class="campo"><label>Formato</label>
        <select name="formato">
          <option value="">—</option>
          <option value="Post feed">Post feed</option>
          <option value="Reels/Short">Reels/Short</option>
          <option value="Story">Story</option>
          <option value="Vídeo longo">Vídeo longo</option>
          <option value="Artigo/Blog">Artigo/Blog</option>
          <option value="Email marketing">Email marketing</option>
          <option value="Anúncio">Anúncio</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
      <div class="campo"><label>Data Prevista</label><input type="date" name="data_prevista"></div>
      <div class="campo"><label>Data Publicação</label><input type="date" name="data_publicacao"></div>
      <div class="campo"><label>Status</label>
        <select name="status">
          <option value="ideia">Ideia</option>
          <option value="em_producao">Em produção</option>
          <option value="revisao">Revisão</option>
          <option value="agendado">Agendado</option>
          <option value="publicado">Publicado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
      <div class="campo"><label>Tags</label><input type="text" name="tags"></div>
      <div class="campo"><label>Descrição</label><textarea name="descricao"></textarea></div>
      <div class="campo"><label>URL Publicado</label><input type="text" name="url_publicado"></div>
      <div class="campo"><label>Arquivo</label><input type="file" name="arquivo" accept=".pdf,.png,.jpg,.jpeg"></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-conteudo')">Cancelar</button>
      <button class="botao" onclick="salvarConteudo()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Campanha -->
<div class="overlay-modal" id="modal-campanha">
  <div class="caixa-modal">
    <h3 id="titulo-modal-campanha">Nova Campanha</h3>
    <form id="form-campanha">
      <input type="hidden" name="id">
      <div class="campo"><label>Nome *</label><input type="text" name="nome" required></div>
      <div class="campo"><label>Objetivo</label><input type="text" name="objetivo"></div>
      <div class="campo"><label>Orçamento</label><input type="text" name="orcamento" data-money=""></div>
      <div class="campo"><label>Início</label><input type="date" name="data_inicio"></div>
      <div class="campo"><label>Fim</label><input type="date" name="data_fim"></div>
      <div class="campo"><label>Status</label>
        <select name="status">
          <option value="planejada">Planejada</option>
          <option value="ativa">Ativa</option>
          <option value="pausada">Pausada</option>
          <option value="encerrada">Encerrada</option>
        </select>
      </div>
      <div class="campo"><label>Resultado</label><textarea name="resultado"></textarea></div>
      <div class="campo"><label>Observações</label><textarea name="observacoes"></textarea></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-campanha')">Cancelar</button>
      <button class="botao" onclick="salvarCampanha()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Métrica -->
<div class="overlay-modal" id="modal-metrica">
  <div class="caixa-modal">
    <h3 id="titulo-modal-metrica">Nova Métrica</h3>
    <form id="form-metrica">
      <input type="hidden" name="id">
      <div class="campo"><label>Canal *</label><select name="canal_id" required></select></div>
      <div class="campo"><label>Mês</label><input type="number" name="periodo_mes" min="1" max="12"></div>
      <div class="campo"><label>Ano</label><input type="number" name="periodo_ano"></div>
      <div class="campo"><label>Seguidores</label><input type="number" name="seguidores"></div>
      <div class="campo"><label>Alcance</label><input type="number" name="alcance"></div>
      <div class="campo"><label>Impressões</label><input type="number" name="impressoes"></div>
      <div class="campo"><label>Engajamento (%)</label><input type="number" step="0.01" name="engajamento"></div>
      <div class="campo"><label>Cliques</label><input type="number" name="cliques"></div>
      <div class="campo"><label>Conversões</label><input type="number" name="conversoes"></div>
      <div class="campo"><label>Observações</label><textarea name="observacoes"></textarea></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-metrica')">Cancelar</button>
      <button class="botao" onclick="salvarMetrica()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Arquivo -->
<div class="overlay-modal" id="modal-arquivo">
  <div class="caixa-modal">
    <h3>Novo Arquivo</h3>
    <form id="form-arquivo">
      <div class="campo"><label>Nome</label><input type="text" name="nome" placeholder="(usa o nome do arquivo se vazio)"></div>
      <div class="campo"><label>Tipo</label>
        <select name="tipo_arquivo">
          <option value="imagem">Imagem</option>
          <option value="video">Vídeo</option>
          <option value="pdf">PDF</option>
          <option value="outro" selected>Outro</option>
        </select>
      </div>
      <div class="campo"><label>Descrição</label><input type="text" name="descricao"></div>
      <div class="campo"><label>Tags</label><input type="text" name="tags"></div>
      <div class="campo"><label>Arquivo</label><input type="file" name="arquivo"></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-arquivo')">Cancelar</button>
      <button class="botao" onclick="salvarArquivo()">Salvar</button>
    </div>
  </div>
</div>
