<!-- Modal Integrante -->
<div class="overlay-modal" id="modal-integrante">
  <div class="caixa-modal">
    <h3 id="titulo-modal-integrante">Novo Integrante</h3>
    <form id="form-integrante">
      <input type="hidden" name="id">
      <div class="campo"><label>Nome *</label><input type="text" name="nome" required></div>
      <div class="campo"><label>Data Nascimento</label><input type="date" name="data_nascimento"></div>
      <div class="campo"><label>CPF</label><input type="text" name="cpf"></div>
      <div class="campo"><label>RG</label><input type="text" name="rg"></div>
      <div class="campo"><label>Nº Passaporte</label><input type="text" name="numero_passaporte"></div>
      <div class="campo"><label>Validade Passaporte</label><input type="date" name="validade_passaporte"></div>
      <div class="campo"><label>Nº Convênio Saúde</label><input type="text" name="numero_convenio_saude"></div>
      <div class="campo"><label>Validade Convênio</label><input type="date" name="validade_convenio_saude"></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-integrante')">Cancelar</button>
      <button class="botao" onclick="salvarIntegrante()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Documento -->
<div class="overlay-modal" id="modal-documento">
  <div class="caixa-modal">
    <h3>Novo Documento</h3>
    <form id="form-documento">
      <div class="campo"><label>Tipo *</label>
        <select name="tipo_documento" required>
          <option value="passaporte">Passaporte</option>
          <option value="rg">RG</option>
          <option value="cnh">CNH</option>
          <option value="convenio">Convênio</option>
          <option value="cert_casamento">Certidão de Casamento</option>
          <option value="cert_nascimento">Certidão de Nascimento</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="campo"><label>Descrição / Número</label><input type="text" name="descricao"></div>
      <div class="campo"><label>Validade</label><input type="date" name="validade"></div>
      <div class="campo"><label>Arquivo</label><input type="file" name="arquivo" accept=".pdf,.png,.jpg,.jpeg"></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-documento')">Cancelar</button>
      <button class="botao" onclick="salvarDocumento()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Consulta -->
<div class="overlay-modal" id="modal-consulta">

<!-- Modal Despesa -->
<div class="overlay-modal" id="modal-despesa">
  <div class="caixa-modal">
    <h3>Nova Despesa</h3>
    <form id="form-despesa">
      <div class="campo"><label>Fornecedor *</label>
        <select name="fornecedor_select" id="select-fornecedor-despesa" onchange="preencherPixDespesa()"><option value="">Selecionar / digitar abaixo</option></select>
        <input type="text" name="fornecedor" placeholder="Nome do fornecedor" required>
      </div>
      <div class="campo"><label>Valor *</label><input type="text" name="valor" data-money required></div>
      <div class="campo"><label>Data Serviço</label><input type="date" name="data_servico"></div>
      <div class="campo"><label>Data Vencimento</label><input type="date" name="data_vencimento"></div>
      <div class="campo"><label>Modo de Pagamento</label>
        <select name="modo_pagamento" id="select-modo-pagamento" onchange="alternarCamposPagamento()">
          <option value="pix">Pix</option>
          <option value="boleto">Boleto</option>
          <option value="transferencia">Transferência</option>
          <option value="parceria">Parceria</option>
          <option value="cartao">Cartão</option>
          <option value="dinheiro">Dinheiro</option>
        </select>
      </div>
      <div class="campo" id="campo-chave-pix-despesa"><label>Chave Pix</label><input type="text" name="chave_pix"></div>
      <div class="campo" id="campo-parceria-despesa" style="display:none;"><label>Especificação da Parceria</label><input type="text" name="especificacao_parceria"></div>
      <div class="campo"><label>Integrante</label><select name="integrante_id" class="select-integrante-generico"><option value="">Nenhum</option></select></div>
      <div class="campo"><label>Status</label>
        <select name="status_pagamento"><option value="pendente">Pendente</option><option value="pago">Pago</option></select>
      </div>
      <div class="campo"><label>Recibo / NF</label><input type="file" name="arquivo" accept=".pdf,.png,.jpg,.jpeg"></div>
    </form>
    <div class="acoes-modal">
      <button class="botao secundario" onclick="fecharModal('modal-despesa')">Cancelar</button>
      <button class="botao" onclick="salvarDespesa()">Salvar</button>
    </div>
  </div>
</div>
